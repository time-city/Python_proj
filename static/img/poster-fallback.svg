<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title>Poster fallback</title>
  <desc>Neutral placeholder shown when a movie poster cannot be loaded.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="60%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="600" height="900" rx="36" fill="url(#bg)"/>
  <circle cx="490" cy="120" r="88" fill="#ffffff" opacity="0.04"/>
  <circle cx="120" cy="770" r="132" fill="#ffffff" opacity="0.04"/>

  <g filter="url(#shadow)">
    <rect x="92" y="112" width="416" height="560" rx="28" fill="#111827" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="132" y="156" width="336" height="278" rx="22" fill="#0b1220"/>
    <path d="M170 390l74-86 72 82 52-48 92 96v20H170z" fill="url(#accent)" opacity="0.92"/>
    <circle cx="238" cy="234" r="28" fill="#cbd5e1" opacity="0.9"/>
    <path d="M182 176l236 236" stroke="#f87171" stroke-width="18" stroke-linecap="round" opacity="0.95"/>
    <path d="M418 176L182 412" stroke="#f87171" stroke-width="18" stroke-linecap="round" opacity="0.95"/>
    <rect x="144" y="486" width="312" height="12" rx="6" fill="#ffffff" opacity="0.07"/>
    <rect x="144" y="522" width="264" height="12" rx="6" fill="#ffffff" opacity="0.07"/>
    <rect x="144" y="558" width="196" height="12" rx="6" fill="#ffffff" opacity="0.07"/>
  </g>

  <text x="300" y="748" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#f8fafc">
    Poster unavailable
  </text>
  <text x="300" y="792" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">
    Image could not be loaded
  </text>
</svg>
